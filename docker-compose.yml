services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: figurinhas_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - figurinhas_network

  nginx:
    image: nginx:alpine
    container_name: figurinhas_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - figurinhas_network

  node:
    image: node:20-alpine
    container_name: figurinhas_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev
    networks:
      - figurinhas_network

  db:
    image: mysql:8.0
    container_name: figurinhas_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: figurinhas
      MYSQL_USER: figurinhas
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - figurinhas_db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - figurinhas_network

  redis:
    image: redis:7-alpine
    container_name: figurinhas_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - figurinhas_network

volumes:
  figurinhas_db_data:

networks:
  figurinhas_network:
    driver: bridge
